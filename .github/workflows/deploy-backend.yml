name: Deploy Symfony API to o2switch (PROD CLEAN)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer

      # 1. Install dependencies (PROD SAFE)
      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      # 2. Clear + warm cache (safe prod)
      - name: Symfony cache warmup
        run: |
          php bin/console cache:clear --env=prod --no-debug
          php bin/console cache:warmup --env=prod

      # 3. Deploy via FTP CLEAN
      - name: Deploy via FTP (CLEAN)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/greenloop-backend/
          dangerous-clean-slate: false

          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/tests/**
            **/var/**
            **/.env*
            **/README.md