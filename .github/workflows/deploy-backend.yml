name: Deploy Symfony API to o2switch

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          ini-values: memory_limit=-1

      - name: Install dependencies (PROD SAFE)
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

      - name: Clear cache (SAFE MODE)
        run: php bin/console cache:clear --env=prod --no-warmup || true

      - name: Warmup cache (SAFE)
        run: php bin/console cache:warmup --env=prod || true

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/greenloop-backend/
          dangerous-clean-slate: true